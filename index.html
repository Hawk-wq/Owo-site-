<!DOCTYPE html>
<html>
<head>
  <title>OwO Bot Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐾 OwO Bot Helper</h1>

<div class="card">
  <h2>🃏 Blackjack Tips</h2>
  <p>17+ → Stand</p>
  <p>11 or less → Hit</p>
  <p>12–16 → Depends on dealer</p>
</div>

<div class="card">
  <h2>🎰 Slots Tips</h2>
  <p>Small bets only</p>
  <p>Stop after 2 wins</p>
  <p>Don't chase losses</p>
</div>

<div class="card">
  <h2>🐾 Hunt Guide</h2>
  <p>Spam hunt on cooldown</p>
  <p>Upgrade rare animals</p>
  <p>Sell common animals</p>
</div>

<div class="card">
  <h2>💰 Coin Calculator</h2>
  <input type="number" id="coins" placeholder="Enter coins">
  <button onclick="calc()">Calculate</button>
  <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
